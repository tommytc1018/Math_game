<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Theo 數棒挑戰</title>
    <style>
        :root {
            /* 微調顏色 */
            --c1: #FFFFFF; --c2: #FF0000; --c3: #7CFC00; --c4: #8A2BE2; 
            --c5: #FFEE00; --c6: #00C957; --c7: #000000; --c8: #A52A2A; 
            --c9: #1E90FF; --c10: #FF8C00;
            --u: 9.2cqw; 
        }
        
        body { 
            font-family: 'PingFang HK', 'Helvetica Neue', sans-serif; 
            background-color: #F1F8E9; 
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 2px; }
        .title { font-size: 1.3rem; color: #2E7D32; font-weight: bold; margin: 0; }
        #message { height: 30px; font-size: 1.1rem; font-weight: bold; margin: 2px 0; }
        
        .play-area { 
            background: white; width: 100%; max-width: 400px; padding: 12px; 
            border-radius: 20px; border: 3px solid #C5E1A5; box-sizing: border-box;
            container-type: inline-size;
        }
        
        .rod { 
            height: 48px; border-radius: 8px; border: 2.5px solid #333; 
            display: inline-flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 22px; box-sizing: border-box;
            box-shadow: inset 0 -4px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .question-zone { 
            display: flex; flex-direction: column; align-items: flex-start;
            gap: 10px; margin-bottom: 12px; padding: 12px;
            background: #F9F9F9; border-radius: 12px;
        }

        .row { display: flex; align-items: center; gap: 8px; width: 100%; min-height: 50px; }
        .symbol { font-size: 28px; font-weight: bold; color: #444; min-width: 25px; text-align: center; }

        .options-zone { display: flex; flex-direction: column; gap: 8px; }
        .option-btn { 
            background: #FFF; border: 2px solid #EEE; border-radius: 15px; 
            padding: 8px; display: flex; justify-content: center; align-items: center;
            min-height: 60px; cursor: pointer; touch-action: manipulation;
        }
        .option-btn:active { transform: scale(0.96); }

        /* 顏色類別 */
        .rod-1 { width: calc(var(--u) * 1); background-color: var(--c1) !important; color: #333 !important; }
        .rod-2 { width: calc(var(--u) * 2); background-color: var(--c2) !important; color: white !important; }
        .rod-3 { width: calc(var(--u) * 3); background-color: var(--c3) !important; color: #333 !important; }
        .rod-4 { width: calc(var(--u) * 4); background-color: var(--c4) !important; color: white !important; }
        .rod-5 { width: calc(var(--u) * 5); background-color: var(--c5) !important; color: #333 !important; }
        .rod-6 { width: calc(var(--u) * 6); background-color: var(--c6) !important; color: white !important; }
        .rod-7 { width: calc(var(--u) * 7); background-color: var(--c7) !important; color: white !important; }
        .rod-8 { width: calc(var(--u) * 8); background-color: var(--c8) !important; color: white !important; }
        .rod-9 { width: calc(var(--u) * 9); background-color: var(--c9) !important; color: white !important; }
        .rod-10 { width: calc(var(--u) * 10); background-color: var(--c10) !important; color: white !important; }

        #target-slot { 
            background-color: #FFFFFF; border: 2.5px solid #CCC; 
            height: 48px; border-radius: 8px; box-sizing: border-box;
            display: inline-flex; align-items: center; justify-content: center;
            color: transparent; 
        }
    </style>
</head>
<body>

<div class="header">
    <p class="title">Theo 數棒挑戰</p>
    <div id="message"></div>
</div>

<div class="play-area">
    <div class="question-zone" id="question"></div>
    <p style="font-size: 14px; color: #558B2F; margin: 0 0 10px 0; font-weight: bold; text-align: center;">哪一個數棒才是正確答案？</p>
    <div class="options-zone" id="options"></div>
</div>

<script>
    let currentAnswer = 0;
    let isLocked = false;

    function initGame() {
        isLocked = false;
        document.getElementById('message').innerText = "";
        const qZone = document.getElementById('question');
        const oZone = document.getElementById('options');
        
        // 隨機出題
        let n1 = Math.floor(Math.random() * 5) + 1;
        let n2 = Math.floor(Math.random() * 5) + 1;
        currentAnswer = n1 + n2;

        qZone.innerHTML = `
            <div class="row">
                <div class="rod rod-${n1}">${n1}</div>
                <div class="symbol">+</div>
                <div class="rod rod-${n2}">${n2}</div>
            </div>
            <div class="row">
                <div class="symbol">=</div>
                <div id="target-slot" style="width: calc(var(--u) * ${currentAnswer})"></div>
            </div>
        `;

        // 生成 4 選 1 選項
        let answers = [currentAnswer];
        while(answers.length < 4) {
            let wrong = Math.floor(Math.random() * 9) + 1;
            if(!answers.includes(wrong)) answers.push(wrong);
        }
        answers.sort((a, b) => a - b);

        oZone.innerHTML = "";
        answers.forEach(val => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="rod rod-${val}">${val}</div>`;
            btn.onclick = () => checkAnswer(val, n1, n2);
            oZone.appendChild(btn);
        });
    }

    function checkAnswer(val, n1, n2) {
        if (isLocked) return;
        const msg = document.getElementById('message');
        const slot = document.getElementById('target-slot');

        if (val === currentAnswer) {
            isLocked = true;
            msg.innerText = "答對了！好棒 ✨";
            msg.style.color = "#2E7D32";
            
            // 答案框變色
            slot.innerText = val;
            slot.className = `rod rod-${val}`; 
            slot.style.color = ([1, 3, 5].includes(val)) ? "#333" : "white";
            slot.style.transform = "scale(1.08)";
            
            // 讀出：答對，題目及答案
            speak(`答對了！${n1}加${n2}等於${currentAnswer}`);
            
            // 延遲後跳下一題
            setTimeout(() => {
                slot.style.transform = "scale(1)";
                initGame(); // 確保跳題
            }, 3000);
        } else {
            msg.innerText = "再數一次喔 💡";
            msg.style.color = "#D84315";
            speak("再試試看");
        }
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        // 修正了 SpeechSynthesisUtterance 拼寫
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'zh-HK';
        m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    window.onload = initGame;
</script>
</body>
</html>
