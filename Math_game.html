<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Theo 數棒加法大冒險</title>
    <style>
        :root {
            /* 古氏數棒標準色 (Cuisenaire Rods Colors) */
            --c1: #FFFFFF; --c2: #F44336; --c3: #8BC34A; --c4: #E91E63; 
            --c5: #FFEB3B; --c6: #4CAF50; --c7: #000000; --c8: #795548; 
            --c9: #3F51B5; --c10: #FF9800;
            --u: 8.8cqw; 
        }
        
        body { 
            font-family: 'PingFang HK', sans-serif; 
            background-color: #F1F8E9; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        .score-board { font-size: 1.5rem; color: #33691E; font-weight: bold; margin-top: 10px; }
        #message { height: 40px; font-size: 1.3rem; font-weight: bold; margin: 10px 0; transition: 0.3s; }
        
        .play-area { 
            background: white; 
            width: 100%; 
            max-width: 420px; 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border: 3px solid #C5E1A5;
            box-sizing: border-box;
            container-type: inline-size;
        }
        
        /* 數棒共用樣式 */
        .rod { 
            height: 46px; 
            border-radius: 8px; 
            border: 2px solid #333; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 -4px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        
        .question-zone { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start;
            gap: 12px; 
            margin-bottom: 25px;
            padding: 15px;
            background: #FAFAFA;
            border-radius: 15px;
        }

        .row { display: flex; align-items: center; gap: 8px; width: 100%; min-height: 50px; }
        .symbol { font-size: 28px; font-weight: bold; color: #555; min-width: 30px; text-align: center; }

        /* 選項垂直排列 */
        .options-zone { 
            display: flex;
            flex-direction: column;
            gap: 12px; 
        }

        .option-btn { 
            background: #FFF; 
            border: 2px solid #EEE; 
            border-radius: 15px; 
            padding: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 70px;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .option-btn:active { background: #DCEDC8; transform: scale(0.97); }

        /* 顏色與寬度定義 - 100% Fill In 核心 */
        .rod-1 { width: calc(var(--u) * 1); background-color: var(--c1) !important; color: #333; }
        .rod-2 { width: calc(var(--u) * 2); background-color: var(--c2) !important; color: white; }
        .rod-3 { width: calc(var(--u) * 3); background-color: var(--c3) !important; color: white; }
        .rod-4 { width: calc(var(--u) * 4); background-color: var(--c4) !important; color: white; }
        .rod-5 { width: calc(var(--u) * 5); background-color: var(--c5) !important; color: #333; }
        .rod-6 { width: calc(var(--u) * 6); background-color: var(--c6) !important; color: white; }
        .rod-7 { width: calc(var(--u) * 7); background-color: var(--c7) !important; color: white; }
        .rod-8 { width: calc(var(--u) * 8); background-color: var(--c8) !important; color: white; }
        .rod-9 { width: calc(var(--u) * 9); background-color: var(--c9) !important; color: white; }
        .rod-10 { width: calc(var(--u) * 10); background-color: var(--c10) !important; color: white; }

        /* 初始狀態：灰色虛線框 */
        #target-slot { 
            border: 3px dashed #BDBDBD; 
            height: 46px; 
            border-radius: 8px; 
            background-color: transparent; /* 初始透明 */
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="score-board">Theo 數棒挑戰</div>
<div id="message"></div>

<div class="play-area">
    <div class="question-zone" id="question"></div>
    <div style="font-size: 15px; color: #666; margin-bottom: 12px; font-weight: bold; text-align: center;">點選正確的答案：</div>
    <div class="options-zone" id="options"></div>
</div>

<script>
    let currentAnswer = 0;
    let isLocked = false;

    function initGame() {
        isLocked = false;
        const msg = document.getElementById('message');
        msg.innerText = "";
        msg.style.color = "#4CAF50";
        
        const qZone = document.getElementById('question');
        const oZone = document.getElementById('options');
        
        // 隨機出題
        let n1 = Math.floor(Math.random() * 5) + 1;
        let n2 = Math.floor(Math.random() * 5) + 1;
        currentAnswer = n1 + n2;

        qZone.innerHTML = `
            <div class="row">
                <div class="rod rod-${n1}">${n1}</div>
                <div class="symbol">+</div>
                <div class="rod rod-${n2}">${n2}</div>
            </div>
            <div class="row">
                <div class="symbol">=</div>
                <div id="target-slot" style="width: calc(var(--u) * ${currentAnswer})"></div>
            </div>
        `;

        let answers = [currentAnswer];
        while(answers.length < 4) {
            let wrong = Math.floor(Math.random() * 9) + 1;
            if(!answers.includes(wrong)) answers.push(wrong);
        }
        answers.sort((a, b) => a - b);

        oZone.innerHTML = "";
        answers.forEach(val => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="rod rod-${val}">${val}</div>`;
            btn.onclick = () => checkAnswer(val, n1, n2);
            oZone.appendChild(btn);
        });
    }

    function checkAnswer(val, n1, n2) {
        if (isLocked) return;
        
        const msg = document.getElementById('message');
        const slot = document.getElementById('target-slot');

        if (val === currentAnswer) {
            isLocked = true;
            msg.innerText = "太棒了！答對了 ✨";
            msg.style.color = "#2E7D32";
            
            // --- 核心 Debug：強制 100% 顯色 ---
            // 1. 填入答案數字
            slot.innerText = val;
            // 2. 徹底換掉 className，強制套用 rod 樣式與對應顏色樣式
            // 這會讓背景變成 100% Fill In (例如黃色)
            slot.className = `rod rod-${val}`;
            // 3. 調整邊框為實線
            slot.style.border = "2px solid #333";
            
            speak(`${n1}加${n2}等於${currentAnswer}`);
            setTimeout(initGame, 2500);
        } else {
            msg.innerText = "再數數看喔 💡";
            msg.style.color = "#E53935";
            speak("不對喔");
        }
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'zh-HK';
        m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    window.onload = initGame;
</script>
</body>
</html>
