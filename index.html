<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo 數棒加法大冒險</title>
    <style>
        :root {
            --c1: #FFFFFF; --c2: #F44336; --c3: #8BC34A; --c4: #E91E63; 
            --c5: #FFEB3B; --c6: #4CAF50; --c7: #000000; --c8: #795548; 
            --c9: #3F51B5; --c10: #FF9800;
        }
        body { font-family: 'PingFang HK', sans-serif; background-color: #E3F2FD; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .game-header { margin-top: 20px; text-align: center; }
        .score-board { font-size: 24px; color: #1565C0; font-weight: bold; }
        
        .play-area { background: white; width: 90%; max-width: 600px; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 20px; border: 5px solid #BBDEFB; }
        
        /* 數棒基礎樣式 */
        .rod { height: 40px; border-radius: 8px; border: 2px solid #555; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        
        /* 題目顯示區 */
        .question-zone { display: flex; align-items: center; justify-content: center; margin-bottom: 40px; gap: 5px; height: 60px; }
        .plus-sign { font-size: 40px; font-weight: bold; color: #555; margin: 0 10px; }
        
        /* 選項區 */
        .options-zone { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .option-btn { background: #F5F5F5; border: 3px solid #DDD; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .option-btn:hover { background: #E3F2FD; border-color: #2196F3; }
        .option-btn:active { transform: scale(0.95); }

        /* 顏色定義 */
        .rod-1 { width: 40px; background-color: var(--c1); color: #333; }
        .rod-2 { width: 80px; background-color: var(--c2); color: white; }
        .rod-3 { width: 120px; background-color: var(--c3); color: white; }
        .rod-4 { width: 160px; background-color: var(--c4); color: white; }
        .rod-5 { width: 200px; background-color: var(--c5); color: #333; }
        .rod-6 { width: 240px; background-color: var(--c6); color: white; }
        .rod-7 { width: 280px; background-color: var(--c7); color: white; }
        .rod-8 { width: 320px; background-color: var(--c8); color: white; }
        .rod-9 { width: 360px; background-color: var(--c9); color: white; }
        .rod-10 { width: 400px; background-color: var(--c10); color: white; }

        #message { margin-top: 20px; font-size: 28px; font-weight: bold; height: 40px; color: #4CAF50; }
    </style>
</head>
<body>

<div class="game-header">
    <div class="score-board">Theo 的數學數棒挑戰</div>
    <div id="message"></div>
</div>

<div class="play-area">
    <div style="margin-bottom: 10px; color: #666;">這兩根數棒加起來是多少？</div>
    <div class="question-zone" id="question">
        </div>

    <div style="margin-bottom: 15px; color: #666;">點選正確的答案：</div>
    <div class="options-zone" id="options">
        </div>
</div>

<script>
    const config = [
        {v:1, c:"rod-1"}, {v:2, c:"rod-2"}, {v:3, c:"rod-3"}, {v:4, c:"rod-4"}, 
        {v:5, c:"rod-5"}, {v:6, c:"rod-6"}, {v:7, c:"rod-7"}, {v:8, c:"rod-8"}, 
        {v:9, c:"rod-9"}, {v:10, c:"rod-10"}
    ];

    let currentAnswer = 0;
    let isLocked = false;

    function initGame() {
        isLocked = false;
        document.getElementById('message').innerText = "";
        const qZone = document.getElementById('question');
        const oZone = document.getElementById('options');
        qZone.innerHTML = "";
        oZone.innerHTML = "";

        // 隨機產生加法題目 (總和不超過 10)
        let n1 = Math.floor(Math.random() * 5) + 1; // 1-5
        let n2 = Math.floor(Math.random() * 4) + 1; // 1-4
        currentAnswer = n1 + n2;

        // 生成題目數棒
        qZone.innerHTML = `
            <div class="rod rod-${n1}">${n1}</div>
            <div class="plus-sign">+</div>
            <div class="rod rod-${n2}">${n2}</div>
            <div class="plus-sign">=</div>
            <div id="target-slot" style="width: ${currentAnswer * 40}px; height: 40px; border: 3px dashed #AAA; border-radius: 8px;"></div>
        `;

        // 生成選項
        let answers = [currentAnswer];
        while(answers.length < 4) {
            let wrong = Math.floor(Math.random() * 9) + 2;
            if(!answers.includes(wrong)) answers.push(wrong);
        }
        answers.sort((a, b) => a - b);

        answers.forEach(val => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="rod rod-${val}">${val}</div>`;
            btn.onclick = () => checkAnswer(val, n1, n2);
            oZone.appendChild(btn);
        });
    }

    function checkAnswer(val, n1, n2) {
        if (isLocked) return;
        
        if (val === currentAnswer) {
            isLocked = true;
            document.getElementById('message').innerText = "太棒了！答對了！";
            document.getElementById('target-slot').className = `rod rod-${val}`;
            document.getElementById('target-slot').innerText = val;
            document.getElementById('target-slot').style.border = "2px solid #555";
            
            speak(`${n1} 加 ${n2} 等於 ${currentAnswer}`);
            
            setTimeout(initGame, 3000);
        } else {
            document.getElementById('message').innerText = "再試一次看看？";
            document.getElementById('message').style.color = "#FF7043";
            speak("不對喔，再數數看");
            setTimeout(() => {
                document.getElementById('message').innerText = "";
                document.getElementById('message').style.color = "#4CAF50";
            }, 1000);
        }
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'zh-HK';
        m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    window.onload = initGame;
</script>
</body>
</html>
